name: pdbe_sifts
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.10,<3.13
  - pip
  - ipython
  - setuptools
  - bioconda::mmseqs2
  - bioconda::blast
  - bioconda::fasta3
  - numpy
  - biopython
  - scikit-learn
  - conda-forge::ete4
  - pip:
    - tqdm
    - funcy
    - lxml
    - requests
    - pandas
    - pymmseqs
    - coloredlogs
    - pyyaml
    - omegaconf
    - gemmi
    - duckdb
    - platformdirs
    - python-dateutil
